kind = "web"
previewPath = "/"
title = "Green Madani International — Corporate Website"
version = "1.0.0"
id = "artifacts/gmi-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23280

[services.development]
run = "pnpm --filter @workspace/gmi-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gmi-website", "run", "build" ]
publicDir = "artifacts/gmi-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23280"
BASE_PATH = "/"
