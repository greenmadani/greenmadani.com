services:
  - type: web
    name: gmi-api
    runtime: node
    branch: main
    buildCommand: cd artifacts/api-server && pnpm install && node build.mjs
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
